$def with (contacto)
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light>

    <div class="container mt-5" style="max-width: 500px;">
        <h1 class="mb-4">Contacto</h1>
        
        <div class="mb-3">
            <label class="form-label">ID</label>
            <input type="text" class="form-control" value="$contacto.id_contacto" readonly>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" value="$contacto.nombre" readonly>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Primer Apellido</label>
            <input type="text" class="form-control" value="$contacto.primer_apellido" readonly>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Segundo Apellido</label>
            <input type="text" class="form-control" value="$contacto.segundo_apellido" readonly>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="tel" class="form-control" value="$contacto.telefono" readonly>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="$contacto.email" readonly>
        </div>

        <div class="mt-4">
            <a href="/lista_contactos" class="btn btn-secondary">Regresar</a>
        </div>
    </div>

</body>
</html>
