<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-6 col-lg-5">
                
                <div class="card shadow-sm p-4 bg-white border rounded-3">
                    <div class="card-body">
                        
                        <h2 class="card-title h4 text-center text-dark pb-2 mb-4 border-bottom">
                            Editar Contacto
                        </h2>
                        
                        <form action="/editar_contacto" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">ID</label>
                                <input type="text" name="id_contacto" class="form-control bg-light text-muted" value="8" readonly>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Nombre</label>
                                <input type="text" name="nombre" class="form-control" value="Dejah" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Primer Apellido</label>
                                <input type="text" name="primer_apellido" class="form-control" value="Thoris" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Segundo Apellido</label>
                                <input type="text" name="segundo_apellido" class="form-control" value="Mars">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Teléfono</label>
                                <input type="text" name="telefono" class="form-control" value="111111">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Email</label>
                                <input type="email" name="email" class="form-control" value="dejah@email.com">
                            </div>
                            
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-primary flex-grow-1 py-2">Guardar cambios</button>
                                <a href="/lista_contactos" class="btn btn-secondary flex-grow-1 py-2">Cancelar</a>
                            </div>
                            
                        </form>
                        
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
