<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div>
        <h2>Insertar Contacto</h2>
        
        <form action="/insertar_contacto" method="post">
            
            <div>
                <label>ID</label>
                <input type="text" class="form-control" placeholder="Generado por el sistema" disabled>
            </div>
            
            <div>
                <label>Nombre *</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            
            <div>
                <label>Primer Apellido</label>
                <input type="text" name="primer_apellido" class="form-control" required>
            </div>
            
            <div>
                <label>Segundo Apellido</label>
                <input type="text" name="segundo_apellido" class="form-control">
            </div>
            
            <div>
                <button>Aceptar</button>
                <a href="/lista_contactos" class="btn btn-outline-dark flex-grow-1">Cancelar</a>
            </div>
            
        </form>
    </div>

</body>
</html>
