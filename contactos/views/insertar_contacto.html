<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Insertar Contacto</title>

    <div class="container">

                <div class="card shadow-sm p-4 borde-rojo rounded-3 bg-white">
                    <div class="card-body">
                        
                        <h2 class="card-title h4 text-center text-dark pb-2 mb-4 border-bottom border-2 border-danger-subtle">

                        <form action="/insertar_contacto" method="post">

                                <label class="form-label fw-bold text-secondary">ID</label>
                                <input type="text" class="form-control bg-light" placeholder="Autogenerado por el sistema" disabled>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Nombre *</label>
                                <input type="text" name="nombre" class="form-control" placeholder="Ej. Dejah" required>
                            </div>
                            
                            <div class="mb-3">

                                <input type="text" name="primer_apellido" class="form-control" placeholder="Ej. Thoris" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Segundo Apellido</label>
                                <input type="text" name="segundo_apellido" class="form-control" placeholder="Ej. Mars">
                            </div>
                            
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-rojo flex-grow-1 py-2">Aceptar</button>
                                <a href="/lista_contactos" class="btn btn-secondary flex-grow-1 py-2">Cancelar</a>
                            </div>
                            
                        </form>
                        
                    </div>
                </div>

            </div>
        </div>
    </div>
