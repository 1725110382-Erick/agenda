<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="card p-4" style="max-width: 450px; width: 100%;">
        <h2 class="h4 text-center mb-4">Insertar Contacto</h2>
        
        <form action="/insertar_contacto" method="post">
            
            <div class="mb-3">
                <label class="form-label">ID</label>
                <input type="text" class="form-control" placeholder="Autogenerado por el sistema" disabled>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Nombre *</label>
                <input type="text" name="nombre" class="form-control" placeholder="Ej. Dejah" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Primer Apellido *</label>
                <input type="text" name="primer_apellido" class="form-control" placeholder="Ej. Thoris" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Segundo Apellido</label>
                <input type="text" name="segundo_apellido" class="form-control" placeholder="Ej. Mars">
            </div>
            
            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-outline-dark flex-grow-1">Aceptar</button>
                <a href="/lista_contactos" class="btn btn-outline-dark flex-grow-1">Cancelar</a>
            </div>
            
        </form>
    </div>

</body>
</html>
