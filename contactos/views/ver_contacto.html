<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                
                <div class="card shadow-sm p-4 bg-white border rounded-3">
                    <div class="card-body">
                        
                        <h2 class="card-title h4 text-center text-dark pb-2 mb-4 border-bottom">
                            Contactos
                        </h2>
                        
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-4 fw-bold text-secondary">ID</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control bg-light text-muted" value="8" readonly>
                            </div>
                        </div>
                        
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-4 fw-bold text-secondary">Nombre</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control bg-light text-muted" value="Dejah" readonly>
                            </div>
                        </div>
                        
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-4 fw-bold text-secondary">Primer Apellido</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control bg-light text-muted" value="Thoris" readonly>
                            </div>
                        </div>
                        
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-4 fw-bold text-secondary">Segundo Apellido</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control bg-light text-muted" value="Mars" readonly>
                            </div>
                        </div>
                        
                        <div class="row mb-3 align-items-center">
                            <label class="col-sm-4 fw-bold text-secondary">Teléfono</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control bg-light text-muted" value="111111" readonly>
                            </div>
                        </div>
                        
                        <div class="row mb-4 align-items-center">
                            <label class="col-sm-4 fw-bold text-secondary">Email</label>
                            <div class="col-sm-8">
                                <input type="email" class="form-control bg-light text-muted" value="dejah@email.com" readonly>
                            </div>
                        </div>
