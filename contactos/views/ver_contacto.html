<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="card p-4" style="max-width: 450px; width: 100%;">
        <h2 class="h4 text-center mb-4">Contactos</h2>
        
        <div class="row mb-3">
            <label class="col-sm-4">ID</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" value="8" readonly>
            </div>
        </div>
        
        <div class="row mb-3">
            <label class="col-sm-4">Nombre</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" value="Dejah" readonly>
            </div>
        </div>
        
        <div class="row mb-3">
            <label class="col-sm-4">Primer Apellido</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" value="Thoris" readonly>
            </div>
        </div>
        
        <div class="row mb-3">
            <label class="col-sm-4">Segundo Apellido</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" value="Mars" readonly>
            </div>
        </div>
        
        <div class="row mb-3">
            <label class="col-sm-4">Teléfono</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" value="111111" readonly>
            </div>
        </div>
        
        <div class="row mb-4">
            <label class="col-sm-4">Email</label>
            <div class="col-sm-8">
                <input type="email" class="form-control" value="dejah@email.com" readonly>
            </div>
        </div>

        <div class="d-grid">
            <a href="/lista_contactos" class="btn btn-outline-dark">Volver</a>
        </div>
    </div>

</body>
</html>
