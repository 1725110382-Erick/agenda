<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="card p-4" style="max-width: 600px; width: 100%;">
        <h1 class="h3 mb-2">Agenda de Contactos</h1>
        
        <nav class="mb-3">
            <a href="/" class="text-decoration-none">Inicio</a> | 
            <a href="/insertar_contactos" class="text-decoration-none">Agregar Nuevo Contacto</a>
        </nav>

        <h2 class="h5 mb-3">Mis Contactos</h2>
        
        <table class="table table-sm align-middle">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Dejah</td>
                    <td>1111111</td>
                    <td>dejah@email.com</td>
                    <td>
                        <a href="/ver_contactos" class="btn btn-sm btn-outline-dark">Ver</a>
                        <a href="/editar_contactos" class="btn btn-sm btn-outline-dark">Editar</a>
                        <a href="/borrar_contactos" class="btn btn-sm btn-outline-dark">Borrar</a>
                    </td>
                </tr>
                <tr>
                    <td>John</td>
                    <td>222222</td>
                    <td>john@email.com</td>
                    <td>
                        <a href="/ver_contactos" class="btn btn-sm btn-outline-dark">Ver</a>
                        <a href="/editar_contactos" class="btn btn-sm btn-outline-dark">Editar</a>
                        <a href="/borrar_contactos" class="btn btn-sm btn-outline-dark">Borrar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
