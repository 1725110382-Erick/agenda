<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div>
        <h1>Borrar Contacto</h1>
        
        <form action="/borrar_contacto" method="post">
            
            <div>
                <label>ID</label>
                <input type="text" name="id_contacto" class="form-control" value="8" readonly>
            </div>
            
            <div>
                <label>Nombre completo</label>
                <input type="text" class="form-control" value="Dejah Thoris Barscom" readonly>
            </div>
            
            <div>
                <label>Teléfono</label>
                <input type="text" class="form-control" value="111111" readonly>
            </div>
            
            <div>
                <label>Email</label>
                <input type="email" class="form-control" value="dejah@email.com" readonly>
            </div>
            
            <div>
                <button>Eliminar</button>
                <button><a href="/lista_contactos">Cancelar</a></button>
            </div>
            
        </form>
    </div>

</body>
</html>
