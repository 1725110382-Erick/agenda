<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-6 col-lg-5">
                
                <div class="card shadow-sm p-4 bg-white border rounded-3">
                    <div class="card-body">
                        
                        <h2 class="card-title h4 text-center text-dark pb-2 mb-3 border-bottom">
                            Borrar Contacto
                        </h2>
                        
                        <div class="alert alert-danger text-center small fw-bold mb-4" role="alert">
                            ¿Está seguro de que desea eliminar permanentemente a este contacto?
                        </div>
                        
                        <form action="/borrar_contacto" method="post">
                            
                            <div class="bg-light p-3 border rounded-3 mb-4">
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-secondary small">ID</label>
                                    <input type="text" name="id_contacto" class="form-control bg-body border-secondary-subtle text-muted" value="8" readonly>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-secondary small">Nombre completo</label>
                                    <input type="text" class="form-control bg-body border-secondary-subtle text-muted" value="Dejah Thoris Barscom" readonly>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-secondary small">Teléfono</label>
                                    <input type="text" class="form-control bg-body border-secondary-subtle text-muted" value="111111" readonly>
                                </div>
                                
                                <div class="mb-0">
                                    <label class="form-label fw-bold text-secondary small">Email</label>
                                    <input type="email" class="form-control bg-body border-secondary-subtle text-muted" value="dejah@email.com" readonly>
                                </div>
                                
                            </div>
                            
                            <div class="d-flex gap-3">
                                <a href="/lista_contact
