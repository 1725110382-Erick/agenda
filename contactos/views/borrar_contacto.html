<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="card p-4" style="max-width: 450px; width: 100%;">
        <h2 class="h4 text-center mb-3">Borrar Contacto</h2>
        
        <div class="alert alert-danger text-center small fw-bold mb-4" role="alert">
            ¿Está seguro de que desea eliminar permanentemente a este contacto?
        </div>
        
        <form action="/borrar_contacto" method="post">
            
            <div class="mb-3">
                <label class="form-label small">ID</label>
                <input type="text" name="id_contacto" class="form-control" value="8" readonly>
            </div>
            
            <div class="mb-3">
                <label class="form-label small">Nombre completo</label>
                <input type="text" class="form-control" value="Dejah Thoris Barscom" readonly>
            </div>
            
            <div class="mb-3">
                <label class="form-label small">Teléfono</label>
                <input type="text" class="form-control" value="111111" readonly>
            </div>
            
            <div class="mb-4">
                <label class="form-label small">Email</label>
                <input type="email" class="form-control" value="dejah@email.com" readonly>
            </div>
            
            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-outline-dark flex-grow-1">Eliminar</button>
                <a href="/lista_contactos" class="btn btn-outline-dark flex-grow-1">Cancelar</a>
            </div>
            
        </form>
    </div>

</body>
</html>
